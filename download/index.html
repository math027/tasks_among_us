<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="au-download">
        <div class="au-painel">
            <img src="img/painel.png" class="au-painel-bg">
            <img src="img/documentos.png" class="au-documentos">
            
            <!-- Left Folder (Source/Destination) -->
            <img src="img/pasta-fechada.png" class="au-pasta-left">
            <img src="img/pasta-aberta1.png" class="au-pasta-aberta1-left">
            <div class="au-label au-label-left" id="label-left"></div>

            <!-- Right Folder (Source/Destination) -->
            <img src="img/pasta-fechada.png" class="au-pasta-right">
            <img src="img/pasta-aberta1.png" class="au-pasta-aberta1-right">
            <div class="au-label au-label-right" id="label-right"></div>

            <!-- Antenna for signal (shown in upload) -->
            <img src="img/antena1.png" alt="" class="au-antena" id="au-antena">

            <!-- Progress & Stats -->
            <div class="au-barra-container" id="barra-container">
                <img src="img/barra-de-progresso.png" class="au-barra">
                <div class="au-progresso-fill" id="progresso-fill"></div>
                <div class="au-percent-text" id="percent-text">0%</div>
                <div class="au-time-text" id="time-text">Estimated Time: --</div>
            </div>

            <!-- Buttons -->
            <img src="img/botao-upload.png" class="au-botao-upload" id="btn-upload">
            <img src="img/botao-download.png" class="au-botao-download" id="btn-download">

            <img src="img/vidro.png" alt="" class="au-vidro">

            <!-- Task Complete Message -->
            <div class="au-complete" id="complete-msg">
                TASK COMPLETE
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
